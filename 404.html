<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Techne</title>
    <script>
      // SPA redirect for GitHub Pages deep links
      // Routes /workshop/* paths to the workshop SPA, preserving the path.
      // All other 404s fall through to the window.location.replace below.
      (function() {
        var l = window.location;
        var path = l.pathname;

        if (path.indexOf('/workshop/') === 0) {
          // Keep /workshop/ as the base (1 segment to keep)
          var pathSegmentsToKeep = 1;
          l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            path.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            path.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
          );
        }
        // No redirect for other paths — allow page to render the 404 message below
      })();
    </script>
  </head>
  <body>
    <noscript>Page not found.</noscript>
  </body>
</html>
