<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Techne Intranet</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="/assets/tokens.css" />
    <style>
      /* ── HUD design tokens — P416 (extends P412 system) ─────────────── */
      :root {
        /* HUD surfaces */
        --hud-surface:      #0a0a18;  /* sidebar background */
        --hud-bar:          #0c0c1a;  /* status bar background */
        --hud-panel:        var(--void, #08080a);  /* content panel background */
        --hud-border:       #1a1a2e;  /* primary panel border */
        --hud-border-deep:  #2a2a3e;  /* elevated border, mobile sidebar */

        /* HUD glow washes */
        --hud-glow-ember:   rgba(194, 81, 42, 0.12);  /* active nav item */
        --hud-glow-green:   rgba(74, 95, 74, 0.15); /* live / verified */
        --hud-glow-amber:   rgba(194, 81, 42, 0.15); /* warning state */
        --hud-glow-blue:    rgba(107, 131, 107, 0.12);/* info state */

        /* HUD text scale */
        --hud-text-primary: #e0e0f0;  /* primary content text */
        --hud-text-muted:   #52526a;  /* secondary / meta text */
        --hud-text-dim:     #2a2a40;  /* decorative, footer text */
        --hud-text-accent:  #8888a8;  /* user name, subdued accent */

        /* Status indicator palette */
        --hud-status-live:  #4a5f4a;  /* connected, verified, active */
        --hud-status-warn:  #c2512a;  /* caution, pending */
        --hud-status-error: #c46a6a;  /* error, failed */
        --hud-status-info:  #6b836b;  /* informational */

        /* Monospace data layer */
        --hud-mono: 'JetBrains Mono', 'IBM Plex Mono', 'Fira Code', Consolas, monospace;

        /* HUD motion */
        --hud-transition: 0.12s ease;

        /* HUD z-index layer */
        --hud-z-panel:    0;
        --hud-z-sidebar:  16;
        --hud-z-backdrop: 15;
        --hud-z-bar:      20;
      }

      body {
        margin: 0;
        font-family: var(--font-sans, 'Inter', system-ui, sans-serif);
        background: var(--hud-panel, #08080a);
        color: var(--hud-text-primary, #e0e0f0);
        min-height: 100vh;
      }
      #root { min-height: 100vh; }
    </style>
    <script type="module" crossorigin src="/intranet/assets/index-R37lJUmU.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
