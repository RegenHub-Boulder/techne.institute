    <rect x="100" y="730" width="1190" height="130" fill="#0f0f0f" stroke="#c4956a" stroke-width="2" rx="4"/>
    <text x="700" y="760" text-anchor="middle" font-family="Libre Baskerville, serif" font-size="18" fill="#c4956a" font-weight="700">North Star at 18 Months</text>

    <g transform="translate(150, 780)">
      <text x="0" y="0" font-family="IBM Plex Mono, monospace" font-size="11" fill="#e8e4dc" font-weight="600">For RegenHub:</text>
      <text x="0" y="18" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">• 80% of coordination on Techne</text>
      <text x="0" y="33" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">• 100% of patronage accounting</text>
      <text x="0" y="48" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">• 704(b) audit-ready ledger</text>
    </g>

    <g transform="translate(500, 780)">
      <text x="0" y="0" font-family="IBM Plex Mono, monospace" font-size="11" fill="#e8e4dc" font-weight="600">For Revenue:</text>
      <text x="0" y="18" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">• 2 paying pilot organizations</text>
      <text x="0" y="33" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">• $100K total ARR</text>
      <text x="0" y="48" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">• 5+ in sales pipeline</text>
    </g>

    <g transform="translate(850, 780)">
      <text x="0" y="0" font-family="IBM Plex Mono, monospace" font-size="11" fill="#e8e4dc" font-weight="600">For Technical:</text>
      <text x="0" y="18" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">• 0 data loss incidents</text>
      <text x="0" y="33" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">• 0 silent corruption</text>
      <text x="0" y="48" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">• 95% voice confirmation accuracy</text>
    </g>
