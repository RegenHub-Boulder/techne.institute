<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .timeline-title { font-family: 'Libre Baskerville', serif; font-size: 24px; fill: #e8e4dc; font-weight: 700; }
      .block-title { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; fill: #c4956a; font-weight: 600; }
      .block-name { font-family: 'Libre Baskerville', serif; font-size: 16px; fill: #e8e4dc; font-weight: 700; }
      .deliverable { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: #c8c3b8; }
      .metric { font-family: 'IBM Plex Mono', monospace; font-size: 9px; fill: #7a9478; }
      .month-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: #999999; letter-spacing: 0.05em; }
    </style>
  </defs>

  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" class="timeline-title">Techne Intranet Refinement — 18-Month Roadmap</text>
  <text x="700" y="65" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#999999" letter-spacing="0.1em">6 BLOCKS · INCREMENTAL DELIVERY · EACH BLOCK = USABLE CAPABILITY</text>

  <!-- Timeline axis -->
  <line x1="100" y1="120" x2="1300" y2="120" stroke="#333333" stroke-width="2"/>

  <!-- Month markers -->
  <g id="months">
    <text x="100" y="110" text-anchor="middle" class="month-label">M0</text>
    <line x1="100" y1="115" x2="100" y2="125" stroke="#333333" stroke-width="2"/>

    <text x="300" y="110" text-anchor="middle" class="month-label">M3</text>
    <line x1="300" y1="115" x2="300" y2="125" stroke="#333333" stroke-width="2"/>

    <text x="500" y="110" text-anchor="middle" class="month-label">M6</text>
    <line x1="500" y1="115" x2="500" y2="125" stroke="#333333" stroke-width="2"/>

    <text x="700" y="110" text-anchor="middle" class="month-label">M9</text>
    <line x1="700" y1="115" x2="700" y2="125" stroke="#333333" stroke-width="2"/>

    <text x="900" y="110" text-anchor="middle" class="month-label">M12</text>
    <line x1="900" y1="115" x2="900" y2="125" stroke="#333333" stroke-width="2"/>

    <text x="1100" y="110" text-anchor="middle" class="month-label">M15</text>
    <line x1="1100" y1="115" x2="1100" y2="125" stroke="#333333" stroke-width="2"/>

    <text x="1300" y="110" text-anchor="middle" class="month-label">M18</text>
    <line x1="1300" y1="115" x2="1300" y2="125" stroke="#333333" stroke-width="2"/>
  </g>

  <!-- Block 1: REA Substrate + Basic Treasury -->
  <g id="block1">
    <rect x="100" y="150" width="190" height="120" fill="#1a1a1a" stroke="#c4956a" stroke-width="2" rx="4"/>
    <text x="195" y="175" text-anchor="middle" class="block-title">Block 1 · Months 1-3</text>
    <text x="195" y="195" text-anchor="middle" class="block-name">REA Substrate</text>
    <text x="195" y="212" text-anchor="middle" class="block-name">+ Basic Treasury</text>

    <text x="110" y="235" class="deliverable">✓ PostgreSQL schema</text>
    <text x="110" y="248" class="deliverable">✓ CRUD UI for events</text>
    <text x="110" y="261" class="deliverable">✓ Derived balances</text>

    <rect x="110" y="270" width="170" height="2" fill="#c4956a" opacity="0.3"/>
    <text x="195" y="283" text-anchor="middle" class="metric">10+ events, balances reconcile</text>
  </g>

  <!-- Block 2: Agreements + Governance -->
  <g id="block2">
    <rect x="300" y="150" width="190" height="120" fill="#1a1a1a" stroke="#c4956a" stroke-width="2" rx="4"/>
    <text x="395" y="175" text-anchor="middle" class="block-title">Block 2 · Months 4-6</text>
    <text x="395" y="195" text-anchor="middle" class="block-name">Agreements</text>
    <text x="395" y="212" text-anchor="middle" class="block-name">+ Governance</text>

    <text x="310" y="235" class="deliverable">✓ Commitments + Contracts</text>
    <text x="310" y="248" class="deliverable">✓ Duality enforcement</text>
    <text x="310" y="261" class="deliverable">✓ Governance proposals</text>

    <rect x="310" y="270" width="170" height="2" fill="#c4956a" opacity="0.3"/>
    <text x="395" y="283" text-anchor="middle" class="metric">Third-floor scenario in system</text>
  </g>

  <!-- Block 3: Voice-First HCI -->
  <g id="block3">
    <rect x="500" y="150" width="190" height="120" fill="#1a1a1a" stroke="#7a9478" stroke-width="2.5" rx="4"/>
    <text x="595" y="175" text-anchor="middle" class="block-title" fill="#7a9478">Block 3 · Months 7-9</text>
    <text x="595" y="195" text-anchor="middle" class="block-name">Voice-First</text>
    <text x="595" y="212" text-anchor="middle" class="block-name">HCI</text>

    <text x="510" y="235" class="deliverable">✓ Whisper transcription</text>
    <text x="510" y="248" class="deliverable">✓ Claude intent parsing</text>
    <text x="510" y="261" class="deliverable">✓ Confirmation loop</text>

    <rect x="510" y="270" width="170" height="2" fill="#7a9478" opacity="0.5"/>
    <text x="595" y="283" text-anchor="middle" class="metric">3+ members use voice in prod</text>
  </g>

  <!-- Block 4: Patronage + 704(b) -->
  <g id="block4">
    <rect x="700" y="150" width="190" height="120" fill="#1a1a1a" stroke="#c4956a" stroke-width="2" rx="4"/>
    <text x="795" y="175" text-anchor="middle" class="block-title">Block 4 · Months 10-12</text>
    <text x="795" y="195" text-anchor="middle" class="block-name">Patronage</text>
    <text x="795" y="212" text-anchor="middle" class="block-name">+ 704(b) Compliance</text>

    <text x="710" y="235" class="deliverable">✓ Patronage balances</text>
    <text x="710" y="248" class="deliverable">✓ 704(b) book capital</text>
    <text x="710" y="261" class="deliverable">✓ Xero projection</text>

    <rect x="710" y="270" width="170" height="2" fill="#c4956a" opacity="0.3"/>
    <text x="795" y="283" text-anchor="middle" class="metric">CPA sign-off on 704(b)</text>
  </g>

  <!-- Block 5: Learning Lens -->
  <g id="block5">
    <rect x="900" y="150" width="190" height="120" fill="#1a1a1a" stroke="#c4956a" stroke-width="2" rx="4"/>
    <text x="995" y="175" text-anchor="middle" class="block-title">Block 5 · Months 13-15</text>
    <text x="995" y="195" text-anchor="middle" class="block-name">Learning Lens</text>
    <text x="995" y="212" text-anchor="middle" class="block-name">+ Transcript Ingestion</text>

    <text x="910" y="235" class="deliverable">✓ Transcript upload</text>
    <text x="910" y="248" class="deliverable">✓ LLM extraction</text>
    <text x="910" y="261" class="deliverable">✓ Pattern library export</text>

    <rect x="910" y="270" width="170" height="2" fill="#c4956a" opacity="0.3"/>
    <text x="995" y="283" text-anchor="middle" class="metric">5+ learning artifacts created</text>
  </g>

  <!-- Block 6: Workshop + Pilots -->
  <g id="block6">
    <rect x="1100" y="150" width="190" height="120" fill="#1a1a1a" stroke="#c4956a" stroke-width="2" rx="4"/>
    <text x="1195" y="175" text-anchor="middle" class="block-title">Block 6 · Months 16-18</text>
    <text x="1195" y="195" text-anchor="middle" class="block-name">Workshop</text>
    <text x="1195" y="212" text-anchor="middle" class="block-name">+ Pilot Deployments</text>

    <text x="1110" y="235" class="deliverable">✓ Capability Grid</text>
    <text x="1110" y="248" class="deliverable">✓ Sprint coordination</text>
    <text x="1110" y="261" class="deliverable">✓ 2 pilot orgs onboarded</text>

    <rect x="1110" y="270" width="170" height="2" fill="#c4956a" opacity="0.3"/>
    <text x="1195" y="283" text-anchor="middle" class="metric">$100K ARR from pilots</text>
  </g>

  <!-- Dependency arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c4956a" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Block 1 → Block 2 -->
  <path d="M 290 210 L 300 210" stroke="#c4956a" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Block 2 → Block 3 -->
  <path d="M 490 210 L 500 210" stroke="#c4956a" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Block 3 → Block 4 -->
  <path d="M 690 210 L 700 210" stroke="#c4956a" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Block 4 → Block 5 -->
  <path d="M 890 210 L 900 210" stroke="#c4956a" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Block 5 → Block 6 -->
  <path d="M 1090 210 L 1100 210" stroke="#c4956a" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Key capabilities (what's enabled at each stage) -->
