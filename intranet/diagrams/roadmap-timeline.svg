    <text x="395" y="358" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">AFTER BLOCK 2</text>
    <text x="310" y="375" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Commitments</text>
    <text x="310" y="390" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Contracts</text>
    <text x="310" y="405" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Governance voting</text>
    <text x="310" y="420" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Dispute resolution</text>

    <!-- Block 3 capabilities -->
    <rect x="500" y="340" width="190" height="90" fill="#222222" stroke="#7a9478" stroke-width="1.5" rx="3"/>
    <text x="595" y="358" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#7a9478">AFTER BLOCK 3</text>
    <text x="510" y="375" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Voice recording</text>
    <text x="510" y="390" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Natural language input</text>
    <text x="510" y="405" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Confirmation loop</text>
    <text x="510" y="420" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Vocabulary learning</text>

    <!-- Block 4 capabilities -->
    <rect x="700" y="340" width="190" height="90" fill="#222222" stroke="#333333" stroke-width="1" rx="3"/>
    <text x="795" y="358" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">AFTER BLOCK 4</text>
    <text x="710" y="375" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Patronage dashboard</text>
    <text x="710" y="390" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ 704(b) reports</text>
    <text x="710" y="405" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Xero integration</text>
    <text x="710" y="420" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Audit-ready ledger</text>

    <!-- Block 5 capabilities -->
    <rect x="900" y="340" width="190" height="90" fill="#222222" stroke="#333333" stroke-width="1" rx="3"/>
    <text x="995" y="358" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">AFTER BLOCK 5</text>
    <text x="910" y="375" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Transcript upload</text>
    <text x="910" y="390" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Auto-extraction</text>
    <text x="910" y="405" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Learning artifacts</text>
    <text x="910" y="420" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Pattern export</text>

    <!-- Block 6 capabilities -->
    <rect x="1100" y="340" width="190" height="90" fill="#222222" stroke="#333333" stroke-width="1" rx="3"/>
    <text x="1195" y="358" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">AFTER BLOCK 6</text>
    <text x="1110" y="375" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Capability Grid</text>
    <text x="1110" y="390" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Sprint tracking</text>
    <text x="1110" y="405" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Multi-org hosting</text>
    <text x="1110" y="420" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">+ Revenue from pilots</text>
  </g>

  <!-- Effort tracking -->
