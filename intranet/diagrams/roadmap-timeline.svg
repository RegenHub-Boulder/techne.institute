    <text x="100" y="480" font-family="IBM Plex Mono, monospace" font-size="11" fill="#c4956a" font-weight="600" letter-spacing="0.1em">EFFORT ALLOCATION (PERSON-WEEKS):</text>

    <rect x="100" y="500" width="1190" height="60" fill="#1a1a1a" stroke="#333333" stroke-width="1" rx="3"/>

    <!-- Effort bars -->
    <rect x="110" y="510" width="160" height="40" fill="#c4956a" opacity="0.3" rx="2"/>
    <text x="190" y="533" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#e8e4dc" font-weight="600">8 weeks</text>
    <text x="190" y="548" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">0.67 FTE</text>

    <rect x="280" y="510" width="180" height="40" fill="#c4956a" opacity="0.3" rx="2"/>
    <text x="370" y="533" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#e8e4dc" font-weight="600">9 weeks</text>
    <text x="370" y="548" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">0.75 FTE</text>

    <rect x="470" y="510" width="200" height="40" fill="#7a9478" opacity="0.4" rx="2"/>
    <text x="570" y="533" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#e8e4dc" font-weight="600">10 weeks</text>
    <text x="570" y="548" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">0.83 FTE</text>

    <rect x="680" y="510" width="240" height="40" fill="#c4956a" opacity="0.3" rx="2"/>
    <text x="800" y="533" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#e8e4dc" font-weight="600">12 weeks</text>
    <text x="800" y="548" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">1.0 FTE</text>

    <rect x="930" y="510" width="200" height="40" fill="#c4956a" opacity="0.3" rx="2"/>
    <text x="1030" y="533" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#e8e4dc" font-weight="600">10 weeks</text>
    <text x="1030" y="548" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">0.83 FTE</text>

    <rect x="1140" y="510" width="140" height="40" fill="#c4956a" opacity="0.3" rx="2"/>
    <text x="1210" y="533" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#e8e4dc" font-weight="600">15 weeks</text>
    <text x="1210" y="548" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">1.25 FTE</text>
  </g>

  <!-- Cumulative progress -->
  <g id="cumulative">
    <text x="100" y="610" font-family="IBM Plex Mono, monospace" font-size="11" fill="#c4956a" font-weight="600" letter-spacing="0.1em">CUMULATIVE PROGRESS:</text>

    <!-- Progress track -->
    <rect x="100" y="630" width="1190" height="30" fill="#1a1a1a" stroke="#333333" stroke-width="1" rx="15"/>

    <!-- Progress fill (animated in real deployment) -->
    <rect x="100" y="630" width="0" height="30" fill="#c4956a" opacity="0.5" rx="15">
      <animate attributeName="width" from="0" to="1190" dur="2s" fill="freeze"/>
    </rect>

    <!-- Milestones -->
    <circle cx="298" cy="645" r="8" fill="#e8e4dc" stroke="#c4956a" stroke-width="2"/>
    <text x="298" y="680" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">Basic ops</text>

    <circle cx="498" cy="645" r="8" fill="#e8e4dc" stroke="#c4956a" stroke-width="2"/>
    <text x="498" y="680" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">Full workflow</text>

    <circle cx="698" cy="645" r="8" fill="#e8e4dc" stroke="#7a9478" stroke-width="3"/>
    <text x="698" y="680" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#7a9478" font-weight="600">Voice-first</text>

    <circle cx="898" cy="645" r="8" fill="#e8e4dc" stroke="#c4956a" stroke-width="2"/>
    <text x="898" y="680" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">Tax ready</text>

    <circle cx="1098" cy="645" r="8" fill="#e8e4dc" stroke="#c4956a" stroke-width="2"/>
    <text x="1098" y="680" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">Commons</text>

    <circle cx="1290" cy="645" r="10" fill="#c4956a" stroke="#e8e4dc" stroke-width="2"/>
    <text x="1290" y="680" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#c4956a" font-weight="600">Revenue</text>
  </g>

  <!-- North Star -->
