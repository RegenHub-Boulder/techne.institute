    <text x="100" y="320" font-family="IBM Plex Mono, monospace" font-size="11" fill="#c4956a" font-weight="600" letter-spacing="0.1em">KEY CAPABILITIES BY BLOCK:</text>

    <!-- Block 1 capabilities -->
    <rect x="100" y="340" width="190" height="90" fill="#222222" stroke="#333333" stroke-width="1" rx="3"/>
    <text x="195" y="358" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#999999">AFTER BLOCK 1</text>
    <text x="110" y="375" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">✓ Manual event entry</text>
    <text x="110" y="390" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">✓ Balance viewing</text>
    <text x="110" y="405" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">✓ Agent registry</text>
    <text x="110" y="420" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c3b8">✓ Immutable ledger</text>

    <!-- Block 2 capabilities -->
