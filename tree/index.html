  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/tokens.css">
  <link rel="stylesheet" href="/assets/public.css">
  <script src="/assets/nav.js" defer></script>

  <style>
    /* ── Tree page design tokens ── */
    :root {
      --z0: #c4956a;   /* ember — home */
      --z1: #22c55e;   /* green — public */
      --z2: #f59e0b;   /* amber — curated */
      --z3: #3b82f6;   /* blue — members */
      --z4: #c4956a;   /* gold — steward */

      --z0-bg: rgba(196, 149, 106, 0.08);
      --z1-bg: rgba(34, 197, 94, 0.07);
      --z2-bg: rgba(245, 158, 11, 0.07);
      --z3-bg: rgba(59, 130, 246, 0.07);
      --z4-bg: rgba(196, 149, 106, 0.07);

      --z0-border: rgba(196, 149, 106, 0.3);
      --z1-border: rgba(34, 197, 94, 0.3);
      --z2-border: rgba(245, 158, 11, 0.3);
      --z3-border: rgba(59, 130, 246, 0.3);
      --z4-border: rgba(196, 149, 106, 0.3);

      --focus-ring: 3px solid #3b82f6;
      --detail-w: 320px;
      --card-bg: var(--bg-card, rgba(235,231,223,0.6));
      --card-border: var(--rule, #d8d3c8);
      --grid-max: 1200px;
    }

    [data-theme="dark"] {
      --z1-bg: rgba(34, 197, 94, 0.1);
      --z2-bg: rgba(245, 158, 11, 0.1);
      --z3-bg: rgba(59, 130, 246, 0.1);
      --z4-bg: rgba(196, 149, 106, 0.1);
      --card-bg: rgba(42, 42, 48, 0.85);
      --card-border: rgba(60, 60, 68, 0.8);
    }

    /* ── Utilities ── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── Hero ── */
    .tree-hero {
      padding: 3rem 2rem 2rem;
      border-bottom: 1px solid var(--rule);
      background: linear-gradient(to bottom, var(--bg), var(--bg-alt));
    }
    .tree-hero .container--wide {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
      max-width: var(--grid-max);
      margin: 0 auto;
    }
    .tree-hero-text h1 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: var(--fg-primary);
    }
    .tree-hero-text p {
      font-size: 1rem;
      color: var(--fg-secondary);
      max-width: 48ch;
      line-height: 1.6;
    }

    /* ── Controls ── */
    .tree-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .mode-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      background: var(--card-bg);
      color: var(--fg-secondary);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      font-family: var(--font-mono, 'IBM Plex Mono', monospace);
    }
    .mode-btn:hover { background: var(--bg-alt); color: var(--fg-primary); }
    .mode-btn.active {
      background: var(--gold, #c4956a);
      border-color: var(--gold, #c4956a);
      color: #fff;
    }
    .mode-btn:focus-visible { outline: var(--focus-ring); outline-offset: 2px; }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      padding: 1rem 2rem;
      background: var(--bg-alt);
      border-bottom: 1px solid var(--rule);
      max-width: var(--grid-max);
      margin: 0 auto;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--fg-secondary);
      font-family: var(--font-mono, 'IBM Plex Mono', monospace);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Main content area ── */
    .tree-main {
      padding: 2rem;
      max-width: var(--grid-max);
      margin: 0 auto;
    }

    /* ── Zone section headers ── */
    .zone-section { margin-bottom: 2.5rem; }
    .zone-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid;
    }
    .zone-header-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .zone-header h2 {
      font-size: 0.9rem;
      font-family: var(--font-mono, 'IBM Plex Mono', monospace);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0;
    }
    .zone-header p {
      font-size: 0.8rem;
      color: var(--fg-secondary);
      margin: 0;
    }

    /* ── Home card (zone 0) ── */
    .home-card-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 2.5rem;
    }
    .home-card {
      min-width: min(400px, 100%);
      max-width: 520px;
      width: 100%;
    }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ── Page card ── */
    .page-card {
      display: block;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
    }
    .page-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .page-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .page-card:focus-visible { outline: var(--focus-ring); outline-offset: 2px; }

    /* Zone accent stripes */
    .page-card[data-zone="0"]::before { background: var(--z0); }
    .page-card[data-zone="1"]::before { background: var(--z1); }
    .page-card[data-zone="2"]::before { background: var(--z2); }
    .page-card[data-zone="3"]::before { background: var(--z3); }
    .page-card[data-zone="4"]::before { background: var(--z4); }

    /* Zone hover borders */
    .page-card[data-zone="0"]:hover { border-color: var(--z0-border); background: var(--z0-bg); }
    .page-card[data-zone="1"]:hover { border-color: var(--z1-border); background: var(--z1-bg); }
    .page-card[data-zone="2"]:hover { border-color: var(--z2-border); background: var(--z2-bg); }
    .page-card[data-zone="3"]:hover { border-color: var(--z3-border); background: var(--z3-bg); }
    .page-card[data-zone="4"]:hover { border-color: var(--z4-border); background: var(--z4-bg); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--fg-primary);
      line-height: 1.3;
    }
    .auth-badge {
      font-size: 0.68rem;
      font-family: var(--font-mono, 'IBM Plex Mono', monospace);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      flex-shrink: 0;
      font-weight: 400;
      letter-spacing: 0.03em;
      border: 1px solid transparent;
    }
    .auth-badge.home    { background: rgba(196,149,106,0.15); color: var(--z0); border-color: var(--z0-border); }
    .auth-badge.public  { background: rgba(34,197,94,0.12);  color: #16a34a;   border-color: rgba(34,197,94,0.3); }
    .auth-badge.curated { background: rgba(245,158,11,0.12); color: #d97706;   border-color: rgba(245,158,11,0.3); }
    .auth-badge.members { background: rgba(59,130,246,0.12); color: #2563eb;   border-color: rgba(59,130,246,0.3); }
    .auth-badge.steward { background: rgba(196,149,106,0.15); color: #9a6a3a;  border-color: rgba(196,149,106,0.3); }

    .card-path {
      font-size: 0.73rem;
      color: var(--fg-tertiary, var(--fg-secondary));
      font-family: var(--font-mono, 'IBM Plex Mono', monospace);
      margin-bottom: 0.5rem;
      opacity: 0.7;
    }
    .card-desc {
      font-size: 0.85rem;
      color: var(--fg-secondary);
      line-height: 1.55;
    }

    /* ── Network mode ── */
    #network-view {
      display: none;
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      height: 640px;
    }
    #network-svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #network-svg:active { cursor: grabbing; }
    .net-node {
      cursor: pointer;
    }
    .net-node circle {
      transition: r 0.15s, opacity 0.15s;
    }
    .net-node:hover circle { opacity: 0.85; }
    .net-node:focus-visible circle { stroke: #3b82f6; stroke-width: 3px; }
    .net-node text {
      font-size: 11px;
      fill: var(--fg-secondary, #666);
      pointer-events: none;
      user-select: none;
    }
    .net-edge {
      stroke: var(--rule, #d8d3c8);
      stroke-width: 1px;
      opacity: 0.5;
    }

    /* ── Detail panel (network mode) ── */
    #detail-panel {
      display: none;
      position: absolute;
      top: 1rem; right: 1rem;
      width: var(--detail-w);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 1.25rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      z-index: 10;
    }
    #detail-panel.open { display: block; }
    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .detail-title { font-size: 1rem; font-weight: 500; color: var(--fg-primary); }
    .detail-close {
      background: none; border: none;
      cursor: pointer; color: var(--fg-secondary);
      font-size: 1.2rem; line-height: 1;
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
    }
    .detail-close:focus-visible { outline: var(--focus-ring); }
    .detail-path {
      font-size: 0.72rem;
      font-family: var(--font-mono, 'IBM Plex Mono', monospace);
      color: var(--fg-secondary);
      margin-bottom: 0.5rem;
      opacity: 0.75;
    }
    .detail-desc { font-size: 0.85rem; color: var(--fg-secondary); line-height: 1.55; margin-bottom: 1rem; }
    .detail-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.82rem;
      color: var(--gold, #c4956a);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .detail-link:hover { border-bottom-color: var(--gold, #c4956a); }
    .detail-link:focus-visible { outline: var(--focus-ring); outline-offset: 2px; }

    /* ── Network zoom controls ── */
    .net-zoom-controls {
      display: none;
      position: absolute;
      bottom: 1rem; left: 1rem;
      gap: 0.25rem;
      flex-direction: column;
    }
    .net-zoom-controls.visible { display: flex; }
    .zoom-btn {
      width: 32px; height: 32px;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      background: var(--card-bg);
      color: var(--fg-secondary);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .zoom-btn:hover { background: var(--bg-alt); }
    .zoom-btn:focus-visible { outline: var(--focus-ring); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .tree-hero { padding: 2rem 1rem 1.5rem; }
      .tree-main { padding: 1.5rem 1rem; }
      .legend { padding: 0.75rem 1rem; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Site nav injected by nav.js -->

  <section class="tree-hero">
    <div class="container--wide">
      <div class="tree-hero-text">
        <h1>Site Map</h1>
        <p>Navigate the full techne.institute domain from one place. Cards show access level, path, and a brief description of each section.</p>
      </div>
      <div class="tree-controls" role="group" aria-label="View mode">
        <button class="mode-btn active" id="btn-grid" aria-pressed="true">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Grid
        </button>
        <button class="mode-btn" id="btn-network" aria-pressed="false">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="2" cy="2" r="1.5" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="2" r="1.5" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="2" cy="12" r="1.5" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="1.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="5.5" y1="5.5" x2="3" y2="3" stroke="currentColor" stroke-width="1"/>
            <line x1="8.5" y1="5.5" x2="11" y2="3" stroke="currentColor" stroke-width="1"/>
            <line x1="5.5" y1="8.5" x2="3" y2="11" stroke="currentColor" stroke-width="1"/>
            <line x1="8.5" y1="8.5" x2="11" y2="11" stroke="currentColor" stroke-width="1"/>
          </svg>
          Network
        </button>
      </div>
    </div>
  </section>

  <div class="legend" role="list" aria-label="Access level legend">
    <div class="legend-item" role="listitem">
      <span class="legend-dot" style="background:var(--z0)"></span>
      <span>home — entry point</span>
    </div>
    <div class="legend-item" role="listitem">
      <span class="legend-dot" style="background:var(--z1)"></span>
      <span>public — open to all</span>
    </div>
    <div class="legend-item" role="listitem">
      <span class="legend-dot" style="background:var(--z2)"></span>
      <span>curated — linked or shared</span>
    </div>
    <div class="legend-item" role="listitem">
      <span class="legend-dot" style="background:var(--z3)"></span>
      <span>members — sign-in required</span>
    </div>
    <div class="legend-item" role="listitem">
      <span class="legend-dot" style="background:var(--z4)"></span>
      <span>steward — organizer access</span>
    </div>
  </div>

  <main class="tree-main" id="grid-view">
    <!-- Populated by JavaScript; static fallback rendered in <noscript> -->
  </main>

  <div id="network-view" role="region" aria-label="Network map of site pages">
    <svg id="network-svg" role="img" aria-label="Interactive network diagram of site structure">
      <defs>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="var(--rule,#d8d3c8)" opacity="0.5"/>
        </marker>
      </defs>
      <g id="net-edges"></g>
      <g id="net-nodes"></g>
    </svg>
    <div id="detail-panel" role="complementary" aria-label="Page detail">
      <div class="detail-header">
        <span class="detail-title" id="detail-title"></span>
        <button class="detail-close" id="detail-close" aria-label="Close detail panel">×</button>
      </div>
      <div class="detail-path" id="detail-path"></div>
      <div class="detail-desc" id="detail-desc"></div>
      <a class="detail-link" id="detail-link" href="#" target="_blank" rel="noopener">
        Visit page
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <path d="M2 10L10 2M10 2H5M10 2v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </a>
    </div>
    <div class="net-zoom-controls" id="zoom-controls" aria-label="Zoom controls">
      <button class="zoom-btn" id="zoom-in" aria-label="Zoom in">+</button>
      <button class="zoom-btn" id="zoom-out" aria-label="Zoom out">−</button>
      <button class="zoom-btn" id="zoom-reset" aria-label="Reset zoom" style="font-size:0.7rem">↺</button>
    </div>
  </div>

  <script>
  // ── Page data ──────────────────────────────────────────────────────────────
  const PAGES = [
    // Zone 0 — Home
    { id:'home', path:'/', title:'Techne Institute', zone:0, authLevel:'home', parent:null,
      description:'A cooperatively-owned studio in Boulder, Colorado. RegenHub LCA — cultivating scenius through shared infrastructure, tools, and collective intelligence.' },

    // Zone 1 — Public
    { id:'about', path:'/about/', title:'About', zone:1, authLevel:'public', parent:'home',
      description:'Who we are, the cooperative structure, and the mission driving Techne Studio.' },
    { id:'people', path:'/people/', title:'People', zone:1, authLevel:'public', parent:'home',
      description:'Organizers and active members of RegenHub LCA — the humans behind the cooperative.' },
    { id:'ventures', path:'/ventures/', title:'Ventures', zone:1, authLevel:'public', parent:'home',

    { id:'join', path:'/join/', title:'Join', zone:1, authLevel:'public', parent:'home',

      description:'Product and organizational roadmap for Techne Studio and the cooperative.' },

    // Zone 4 — Steward (organizer access)

      description:'Member management, allocation entry, and stewardship tools. Organizer access only.' },

      description:'Agent coordination workspace — sprint management, agent communication, and coordination activity feed.' },
  ]

  // ── Zone metadata ──────────────────────────────────────────────────────────
  const ZONE_META = {
    0: { label: 'Home', desc: 'Entry point', color: 'var(--z0)', border: 'var(--z0)' },
    1: { label: 'Public', desc: 'Open to all visitors', color: 'var(--z1)', border: 'rgba(34,197,94,0.4)' },
    2: { label: 'Curated', desc: 'Linked or shared — not broadly indexed', color: 'var(--z2)', border: 'rgba(245,158,11,0.4)' },
    3: { label: 'Members', desc: 'Sign-in required', color: 'var(--z3)', border: 'rgba(59,130,246,0.4)' },
    4: { label: 'Steward', desc: 'Organizer access only', color: 'var(--z4)', border: 'rgba(196,149,106,0.4)' },
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function makeCard(page) {
    const a = document.createElement('a')
    a.className = 'page-card'
    a.href = page.authLevel === 'members' || page.authLevel === 'steward'
      ? 'https://techne.institute' + page.path
      : page.path
    if (page.authLevel === 'members' || page.authLevel === 'steward') {
      a.target = '_blank'
      a.rel = 'noopener'
    }
    a.setAttribute('data-zone', page.zone)
    a.setAttribute('aria-label', `${page.title} — ${page.authLevel} page at ${page.path}`)
    a.innerHTML = `
      <div class="card-top">
        <span class="card-title">${page.title}</span>
        <span class="auth-badge ${page.authLevel}" aria-hidden="true">${page.authLevel}</span>
        <span class="sr-only">(${page.authLevel} access)</span>
      </div>
      <div class="card-path">${page.path}</div>
      <div class="card-desc">${page.description}</div>
    `
    return a
  }

  // ── Grid mode render ───────────────────────────────────────────────────────
  function renderGrid() {
    const main = document.getElementById('grid-view')
    main.innerHTML = ''

    // Zone 0 home card centered
    const homePage = PAGES.find(p => p.zone === 0)
    const homeWrapper = document.createElement('div')
    homeWrapper.className = 'home-card-wrapper'
    const homeCard = makeCard(homePage)
    homeCard.classList.add('home-card')
    homeWrapper.appendChild(homeCard)
    main.appendChild(homeWrapper)

    // Zones 1–4 as sections
    for (const zone of [1, 2, 3, 4]) {
      const pages = PAGES.filter(p => p.zone === zone)
      if (!pages.length) continue
      const meta = ZONE_META[zone]

      const section = document.createElement('section')
      section.className = 'zone-section'
      section.setAttribute('aria-label', `Zone ${zone}: ${meta.label}`)

      const header = document.createElement('div')
      header.className = 'zone-header'
      header.style.borderColor = meta.border
      header.innerHTML = `
        <span class="zone-header-dot" style="background:${meta.color}" aria-hidden="true"></span>
        <h2 style="color:${meta.color}">${meta.label}</h2>
        <p>${meta.desc}</p>
      `
      section.appendChild(header)

      const grid = document.createElement('div')
      grid.className = 'card-grid'
      for (const page of pages) grid.appendChild(makeCard(page))
      section.appendChild(grid)
      main.appendChild(section)
    }
  }

  // ── Network mode render ────────────────────────────────────────────────────
  const ZONE_COLORS = { 0:'#c4956a', 1:'#22c55e', 2:'#f59e0b', 3:'#3b82f6', 4:'#c4956a' }
  const NODE_RADIUS = { 0:20, 1:14, 2:12, 3:10, 4:10 }

  let netTransform = { x:0, y:0, scale:1 }
  let netNodes = []
  let dragging = false
  let dragStart = null

  function buildEdges(svg) {
    const edgeG = document.getElementById('net-edges')
    edgeG.innerHTML = ''
    const pageMap = {}
    for (const p of PAGES) pageMap[p.id] = p

    for (const page of PAGES) {
      if (!page.parent) continue
      const parent = pageMap[page.parent]
      if (!parent) continue
      const pn = netNodes.find(n => n.id === parent.id)
      const cn = netNodes.find(n => n.id === page.id)
      if (!pn || !cn) continue
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line')
      line.className = 'net-edge'
      line.setAttribute('x1', pn.x); line.setAttribute('y1', pn.y)
      line.setAttribute('x2', cn.x); line.setAttribute('y2', cn.y)
      line.setAttribute('data-from', parent.id)
      line.setAttribute('data-to', page.id)
      edgeG.appendChild(line)
    }
  }

  function layoutNodes(W, H) {
    // Concentric layout: zone 0 at center, zones 1-4 in rings
    const radii = { 0:0, 1: Math.min(W,H)*0.18, 2: Math.min(W,H)*0.32, 3: Math.min(W,H)*0.45, 4: Math.min(W,H)*0.57 }
    const cx = W/2, cy = H/2
    const zonePages = {0:[], 1:[], 2:[], 3:[], 4:[]}
    for (const p of PAGES) zonePages[p.zone].push(p)

    netNodes = []
    for (const zone of [0,1,2,3,4]) {
      const pages = zonePages[zone]
      const r = radii[zone]
      pages.forEach((p, i) => {
        const angle = pages.length > 1 ? (2 * Math.PI * i / pages.length) - Math.PI/2 : -Math.PI/2
        netNodes.push({
          id: p.id,
          x: cx + r * Math.cos(angle),
          y: cy + r * Math.sin(angle),
          page: p,
        })
      })
    }
  }

  function renderNetworkNodes() {
    const nodeG = document.getElementById('net-nodes')
    nodeG.innerHTML = ''
    for (const node of netNodes) {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g')
      g.className = 'net-node'
      g.setAttribute('tabindex', '0')
      g.setAttribute('role', 'button')
      g.setAttribute('aria-label', `${node.page.title} — ${node.page.authLevel}`)
      g.setAttribute('data-id', node.id)

      const r = NODE_RADIUS[node.page.zone] || 10
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
      circle.setAttribute('cx', node.x)
      circle.setAttribute('cy', node.y)
      circle.setAttribute('r', r)
      circle.setAttribute('fill', ZONE_COLORS[node.page.zone])
      circle.setAttribute('fill-opacity', '0.85')
      g.appendChild(circle)

      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text')
      label.setAttribute('x', node.x)
      label.setAttribute('y', node.y + r + 13)
      label.setAttribute('text-anchor', 'middle')
      label.textContent = node.page.title.length > 14 ? node.page.title.substring(0,13)+'…' : node.page.title
      g.appendChild(label)

      g.addEventListener('click', () => openDetail(node.page))
      g.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDetail(node.page) }
        if (e.key === 'Escape') closeDetail()
      })
      nodeG.appendChild(g)
    }
  }

  function applyTransform() {
    const { x, y, scale } = netTransform
    document.getElementById('net-edges').setAttribute('transform', `translate(${x},${y}) scale(${scale})`)
    document.getElementById('net-nodes').setAttribute('transform', `translate(${x},${y}) scale(${scale})`)
  }

  function openDetail(page) {
    document.getElementById('detail-title').textContent = page.title
    document.getElementById('detail-path').textContent = page.path
    document.getElementById('detail-desc').textContent = page.description
    const link = document.getElementById('detail-link')
    link.href = page.path
    document.getElementById('detail-panel').classList.add('open')
  }
  function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open')
  }

  function initNetwork() {
    const svg = document.getElementById('network-svg')
    const rect = svg.getBoundingClientRect()
    const W = rect.width || 900
    const H = rect.height || 640

    layoutNodes(W, H)
    buildEdges(svg)
    renderNetworkNodes()
    applyTransform()

    // Pan
    svg.addEventListener('mousedown', e => {
      if (e.target.closest('.net-node')) return
      dragging = true
      dragStart = { x: e.clientX - netTransform.x, y: e.clientY - netTransform.y }
    })
    window.addEventListener('mousemove', e => {
      if (!dragging) return
      netTransform.x = e.clientX - dragStart.x
      netTransform.y = e.clientY - dragStart.y
      applyTransform()
    })
    window.addEventListener('mouseup', () => { dragging = false })

    // Zoom wheel
    svg.addEventListener('wheel', e => {
      e.preventDefault()
      const factor = e.deltaY < 0 ? 1.12 : 0.88
      netTransform.scale = Math.max(0.3, Math.min(3, netTransform.scale * factor))
      applyTransform()
    }, { passive: false })

    // Zoom buttons
    document.getElementById('zoom-in').addEventListener('click', () => {
      netTransform.scale = Math.min(3, netTransform.scale * 1.2)
      applyTransform()
    })
    document.getElementById('zoom-out').addEventListener('click', () => {
      netTransform.scale = Math.max(0.3, netTransform.scale / 1.2)
      applyTransform()
    })
    document.getElementById('zoom-reset').addEventListener('click', () => {
      netTransform = { x:0, y:0, scale:1 }
      applyTransform()
    })

    document.getElementById('zoom-controls').classList.add('visible')
    document.getElementById('detail-close').addEventListener('click', closeDetail)
  }

  // ── Mode toggle ────────────────────────────────────────────────────────────
  let networkInitialized = false

  document.getElementById('btn-grid').addEventListener('click', () => {
    document.getElementById('grid-view').style.display = ''
    document.getElementById('network-view').style.display = 'none'
    document.getElementById('btn-grid').classList.add('active')
    document.getElementById('btn-grid').setAttribute('aria-pressed', 'true')
    document.getElementById('btn-network').classList.remove('active')
    document.getElementById('btn-network').setAttribute('aria-pressed', 'false')
  })

  document.getElementById('btn-network').addEventListener('click', () => {
    document.getElementById('grid-view').style.display = 'none'
    document.getElementById('network-view').style.display = 'block'
    document.getElementById('btn-grid').classList.remove('active')
    document.getElementById('btn-grid').setAttribute('aria-pressed', 'false')
    document.getElementById('btn-network').classList.add('active')
    document.getElementById('btn-network').setAttribute('aria-pressed', 'true')
    if (!networkInitialized) {
      networkInitialized = true
      // Use rAF to ensure the SVG is laid out before measuring
      requestAnimationFrame(() => initNetwork())
    }
  })

  // ── Init ───────────────────────────────────────────────────────────────────
  renderGrid()
  </script>
